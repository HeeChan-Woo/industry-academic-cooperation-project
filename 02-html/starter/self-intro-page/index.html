<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이름을 입력하세요 - 자기소개 페이지</title>
  </head>
  <body>
    <header>
      <!-- TODO: 자신의 이름으로 수정해보세요. -->
      <h1>이름을 입력하세요</h1>
      <!-- TODO: 자신을 소개하는 한 줄 문장으로 수정해보세요. -->
      <p>이곳에 나를 소개하는 한 줄 문장을 작성하세요.</p>
    </header>

    <main>
      <section>
        <h2>기본 정보</h2>
        <p><strong>학번:</strong> 20260000</p>
        <p><strong>전공:</strong> 전공을 입력하세요</p>
        <p><strong>관심 분야:</strong> 관심 분야를 입력하세요</p>
      </section>

      <section>
        <h2>프로필 이미지</h2>
        <!-- TODO: alt 문구를 자신에게 맞게 조금 더 구체적으로 바꿔보세요. -->
        <img
          src="../../assets/profile-placeholder.svg"
          alt="자기소개용 기본 프로필 이미지"
          width="240"
        />
        <p>이미지가 안 보일 때는 src 경로와 파일 이름을 먼저 확인해보세요.</p>
      </section>

      <section>
        <h2>좋아하는 것</h2>
        <ul>
          <!-- TODO: 자신이 좋아하는 활동이나 취미를 3개 이상 작성해보세요. -->
          <li>좋아하는 것 1</li>
          <li>좋아하는 것 2</li>
          <li>좋아하는 것 3</li>
        </ul>

        <!-- TODO: 자주 방문하는 사이트 주소와 문구를 수정해보세요. -->
        <p>
          <a href="https://example.com" target="_blank">자주 방문하는 사이트</a>
        </p>
      </section>

      <section>
        <h2>이번 학기 시간표</h2>
        <table border="1">
          <tr>
            <th>요일</th>
            <th>활동</th>
            <th>메모</th>
          </tr>
          <tr>
            <td>월요일</td>
            <td>수업 이름</td>
            <td>메모를 입력하세요</td>
          </tr>
          <tr>
            <td>수요일</td>
            <td>수업 이름</td>
            <td>메모를 입력하세요</td>
          </tr>
          <tr>
            <td>금요일</td>
            <td>수업 이름</td>
            <td>메모를 입력하세요</td>
          </tr>
        </table>
      </section>
    </main>
  </body>
</html>
